name: knowledge-base
description: Knowledge base builder and retriever for product data

database_path: .autoservice/database/knowledge_base
sources_file: skills/knowledge-base/references/sources.json

chunk:
  max_chars: 800
  min_chars: 50
  rows_per_xlsx_chunk: 15
  web_crawl_delay: 0.5

search:
  default_top_k: 5
  min_score_threshold: -20.0
